  # ════════════════════════════════════════════════════════════════════
  #  TRADING
  # ════════════════════════════════════════════════════════════════════
  /api/accounts/{id}/orders:
    parameters:
      - $ref: "#/components/parameters/accountId"

    post:
      operationId: createOrder
      tags: [Trading]
      summary: Place order
      description: |
        Send a new order to the broker. Supports market, limit, stop, and stop-limit orders.

        **Side + Type mapping:**
        - `buy` + `market` = Buy
        - `sell` + `market` = Sell
        - `buy` + `limit` = BuyLimit
        - `sell` + `limit` = SellLimit
        - `buy` + `stop` = BuyStop
        - `sell` + `stop` = SellStop
        - `buy` + `stop_limit` = BuyStopLimit
        - `sell` + `stop_limit` = SellStopLimit
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "422":
          description: Order rejected by broker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listOpenOrders
      tags: [Trading]
      summary: List open orders
      description: Returns all open positions and pending orders.
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Open orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  /api/accounts/{id}/orders/{ticket}:
    parameters:
      - $ref: "#/components/parameters/accountId"
      - $ref: "#/components/parameters/ticket"

    put:
      operationId: modifyOrder
      tags: [Trading]
      summary: Modify order
      description: Modify an existing open or pending order's price, stop loss, or take profit.
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyOrderRequest"
      responses:
        "200":
          description: Modification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"

    delete:
      operationId: closeOrder
      tags: [Trading]
      summary: Close order
      description: Close a position or cancel a pending order. Optionally close partial volume.
      security:
        - ApiKeyHeader: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseOrderRequest"
      responses:
        "200":
          description: Close result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"

  /api/accounts/{id}/orders/history:
    parameters:
      - $ref: "#/components/parameters/accountId"
      - name: from
        in: query
        required: true
        schema:
          type: string
        description: "Start datetime (YYYY-MM-DDTHH:mm:ss)"
        example: "2026-01-01T00:00:00"
      - name: to
