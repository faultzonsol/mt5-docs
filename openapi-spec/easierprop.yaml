  # ════════════════════════════════════════════════════════════════════
  #  ACCOUNTS
  # ════════════════════════════════════════════════════════════════════
  /api/accounts:
    post:
      operationId: createAccount
      tags: [Accounts]
      summary: Create account
      description: |
        Register a new MT5 broker account. Credentials are encrypted at rest with AES-256-GCM.
        The account limit is controlled by the API key's `max_accounts` setting.
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Account limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listAccounts
      tags: [Accounts]
      summary: List accounts
      description: Returns all MT5 accounts for the authenticated API key with live session status.
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/accountId"

    get:
      operationId: getAccount
      tags: [Accounts]
      summary: Get account
      description: Returns a single account by ID.
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateAccount
      tags: [Accounts]
      summary: Update account
      description: Partial update. Only include fields you want to change. Updating credentials disconnects the active session.
      security:
        - ApiKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteAccount
      tags: [Accounts]
      summary: Delete account
      description: Permanently delete an account. Disconnects any active session.
      security:
        - ApiKeyHeader: []
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "404":
          $ref: "#/components/responses/NotFound"

