openapi: 3.0.3
info:
  title: Easier Prop REST API
  version: 1.0.0
  description: |
    MT5 Trading API. Manage multiple broker accounts, execute trades, and query market data.

    All endpoints require authentication via `X-API-Key` header or `Authorization: Bearer` header.

servers:
  - url: https://api.easierprop.com
    description: Production

security:
  - ApiKeyHeader: []
  - BearerAuth: []

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    Account:
      type: object
      properties:
        auto_connect:
          type: boolean
          example: false
        broker_host:
          type: string
          example: "mt5-demo.icmarkets.com"
        broker_port:
          type: integer
          example: 443
        created_at:
          type: string
          format: date-time
        id:
          type: string
          format: uuid
          example: "70f60784-20f1-45ba-9a04-8e01c0b810c3"
        is_enabled:
          type: boolean
          example: true
        label:
          type: string
          example: "ICMarkets Demo"
        mt5_login:
          type: integer
          format: int64
          example: 51234567
        session_status:
          type: string
          enum: [connected, disconnected]
          example: "disconnected"
        updated_at:
          type: string
          format: date-time

    AccountSummary:
      type: object
      properties:
        balance:
          type: number
          example: 10000.00
        credit:
          type: number
          example: 0.00
        currency:
          type: string
          example: "USD"
        equity:
          type: number
          example: 10142.50
        freeMargin:
          type: number
          example: 9642.50
        isInvestor:
          type: boolean
          example: false
        leverage:
          type: integer
          example: 100
        margin:
          type: number
          example: 500.00
        marginLevel:
          type: number
          example: 2028.50
        method:
          type: string
          example: "Exchange"
        profit:
          type: number
          example: 142.50
        type:
          type: string
          example: "Hedging"

    AccountDetails:
      type: object
      properties:
        accountLeverage:
          type: integer
          example: 100
        accountMethod:
          type: string
          example: "Exchange"
        accountName:
          type: string
          example: "John Doe"
        accountType:
          type: string
          example: "Hedging"
        company:
          type: string
          example: "IC Markets"
        currency:
          type: string
          example: "USD"
        group:
          type: string
          example: "demo\\hedging\\USD"
        host:
          type: string
          example: "mt5-demo.icmarkets.com"
        isInvestor:
          type: boolean
          example: false
        password:
          type: string
          example: ""
        port:
          type: integer
          example: 443
        serverName:
          type: string
          example: "ICMarketsSC-Demo"
        serverTime:
          type: string
          example: "2026-04-01T12:00:00"
        serverTimeZone:
          type: string
          example: "UTC"
        user:
          type: integer
          format: int64
          example: 51234567

    Order:
      type: object
      description: Full order/position object as returned by the broker
      properties:
        ticket:
          type: integer
          format: int64
          example: 12345678
        symbol:
          type: string
          example: "EURUSD"
        orderType:
          type: string
          example: "Buy"
        lots:
          type: number
          example: 0.01
        openPrice:
          type: number
          example: 1.08542
        stopLoss:
          type: number
          example: 0.0
        takeProfit:
          type: number
          example: 0.0
        profit:
          type: number
          example: 3.20
        swap:
          type: number
          example: 0.0
        commission:
          type: number
          example: -0.07
        comment:
          type: string
          example: ""
        openTime:
          type: string
          example: "2026-04-01T12:00:00"
        closePrice:
          type: number
          example: 0.0
        closeTime:
          type: string
          example: ""
        dealType:
          type: string
          example: "Buy"
        digits:
          type: integer
          example: 5
        contractSize:
          type: number
          example: 100000
        volume:
          type: number
          example: 0.01
        state:
          type: string
          example: "Filled"
        fillPolicy:
          type: string
          example: "FillOrKill"
        expirationType:
          type: string
          example: "GTC"
        expertId:
          type: integer
          format: int64
          example: 0
        dealInternalIn:
          type: integer
          format: int64
          example: 0
        dealInternalOut:
          type: integer
          format: int64
          example: 0
        orderInternal:
          type: integer
          format: int64
          example: 0
        partialCloseDeals:
          type: array
          items:
            type: object
        partialFillDeals:
          type: array
          items:
            type: object
        placedType:
          type: string
          example: "ByClient"
        profitRate:
          type: number
          example: 1.0
        requestId:
          type: integer
          format: int64
          example: 0
        stopLimitPrice:
          type: number
          example: 0.0
        fee:
          type: number
          example: 0.0
        closeComment:
          type: string
          example: ""
        closeLots:
          type: number
          example: 0.0
        closeVolume:
          type: number
          example: 0.0
        openTimestampUTC:
          type: integer
          format: int64
          example: 1711972800
        closeTimestampUTC:
          type: integer
          format: int64
          example: 0
        expirationTime:
          type: string
          example: ""

    Quote:
      type: object
      properties:
        ask:
          type: number
          example: 1.08544
        bid:
          type: number
          example: 1.08542
        last:
          type: number
          example: 0.0
        symbol:
          type: string
          example: "EURUSD"
        time:
          type: string
          example: "2026-04-01T12:30:00"
        volume:
          type: number
          example: 0.0

    SessionStatus:
      type: object
      properties:
        connected:
          type: boolean
          example: true
        connected_since_secs:
          type: integer
          nullable: true
          example: 3421
        reconnect_count:
          type: integer
          example: 0

    SessionConnect:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        connected:
          type: boolean
          example: true

    Portfolio:
      type: object
      properties:
        account:
          type: string
          format: uuid
        position_count:
          type: integer
          example: 3
        positions:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total_commission:
          type: number
          example: -0.21
        total_profit:
          type: number
          example: 142.50
        total_swap:
          type: number
          example: -1.20

    Risk:
      type: object
      properties:
        balance:
          type: number
          example: 10000.00
        drawdown_from_balance:
          type: number
          example: -142.50
        drawdown_pct:
          type: number
          example: 1.42
        equity:
          type: number
          example: 10142.50
        exposure:
          type: number
          example: 1000.00
        floating_pl:
          type: number
          example: 142.50
        margin_free:
          type: number
          example: 9642.50
        margin_level_pct:
          type: number
          example: 2028.50
        margin_used:
          type: number
          example: 500.00
        position_count:
          type: integer
          example: 3
        total_lots:
          type: number
          example: 0.03

    MarketStatusItem:
      type: object
      properties:
        ask:
          type: number
          example: 1.08544
        bid:
          type: number
          example: 1.08542
        digits:
          type: integer
          example: 5
        spread_pips:
          type: number
          example: 0.2
        spread_points:
          type: integer
          example: 2
        symbol:
          type: string
          example: "EURUSD"
        tradeable:
          type: boolean
          example: true

    MarginCheck:
      type: object
      properties:
        can_trade:
          type: boolean
          example: true
        free_margin:
          type: number
          example: 9642.50
        margin_usage_pct:
          type: number
          example: 4.93
        remaining_after:
          type: number
          example: 9142.50
        required_margin:
          type: number
          example: 500.00
        side:
          type: string
          example: "buy"
        symbol:
          type: string
          example: "EURUSD"
        volume:
          type: number
          example: 0.01

    Performance:
      type: object
      properties:
        avg_loss:
          type: number
          example: -25.30
        avg_trade_duration_secs:
          type: number
          example: 3600
        avg_win:
          type: number
          example: 45.20
        best_trade:
          type: number
          example: 120.00
        losing_trades:
          type: integer
          example: 5
        net_profit:
          type: number
          example: 142.50
        profit_factor:
          type: number
          example: 2.13
        total_loss:
          type: number
          example: -126.50
        total_profit:
          type: number
          example: 269.00
        total_trades:
          type: integer
          example: 11
        win_rate:
          type: number
          example: 54.5
        winning_trades:
          type: integer
          example: 6
        worst_trade:
          type: number
          example: -50.00

    PositionDetail:
      description: Same as Order plus netProfit field
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            netProfit:
              type: number
              example: 3.13

    Breakeven:
      type: object
      properties:
        new_sl:
          type: number
          example: 1.08542
        old_sl:
          type: number
          example: 0.0
        open_price:
          type: number
          example: 1.08542
        result:
          type: string
          example: "ok"
        symbol:
          type: string
          example: "EURUSD"
        ticket:
          type: integer
          format: int64
          example: 12345678

    CopyTrade:
      type: object
      properties:
        failed:
          type: integer
          example: 0
        results:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        succeeded:
          type: integer
          example: 2

    CloseAll:
      type: object
      properties:
        closed:
          type: array
          items:
            type: integer
            format: int64
          example: [12345678, 12345679]
        failed:
          type: array
          items:
            type: object
        total_closed:
          type: integer
          example: 2
        total_failed:
          type: integer
          example: 0

    Error:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "ACCOUNT_NOT_FOUND"
            message:
              type: string
              example: "Account not found"

  responses:
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Account not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

tags:
  - name: Accounts
    description: Register and manage MT5 broker accounts
  - name: Sessions
    description: Control broker connections
  - name: Trading
    description: Place, modify, and close orders
  - name: Enhanced Trading
    description: Portfolio, risk, copy-trade, breakeven, close-all, and position details
  - name: Account Info
    description: Balance, equity, and statistics
  - name: Market Data
    description: Symbols, quotes, OHLC history, market status, and margin checks

paths:
  /api/accounts:
    get:
      operationId: listAccounts
      tags: [Accounts]
      summary: List accounts
      description: Returns all MT5 accounts for the authenticated API key with live session status.
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createAccount
      tags: [Accounts]
      summary: Create account
      description: Register a new MT5 broker account. Credentials are encrypted at rest with AES-256-GCM. Max 4 accounts per API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, broker_host, mt5_login, password]
              properties:
                label:
                  type: string
                  description: Friendly name
                  example: "ICMarkets Demo"
                broker_host:
                  type: string
                  description: MT5 broker server hostname or IP
                  example: "mt5-demo.icmarkets.com"
                broker_port:
                  type: integer
                  description: Broker port
                  default: 443
                  example: 443
                mt5_login:
                  type: integer
                  format: int64
                  description: MT5 account number
                  example: 51234567
                password:
                  type: string
                  description: MT5 account password (stored encrypted)
                  example: "MyP@ssw0rd"
                auto_connect:
                  type: boolean
                  description: Auto-connect on gateway start
                  default: false
      responses:
        "200":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Account limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/accounts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Account ID

    get:
      operationId: getAccount
      tags: [Accounts]
      summary: Get account
      description: Returns a single account by ID.
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateAccount
      tags: [Accounts]
      summary: Update account
      description: Update account fields. Only include fields you want to change. Updating credentials disconnects the active session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                broker_host:
                  type: string
                broker_port:
                  type: integer
                mt5_login:
                  type: integer
                  format: int64
                password:
                  type: string
                is_enabled:
                  type: boolean
                auto_connect:
                  type: boolean
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteAccount
      tags: [Accounts]
      summary: Delete account
      description: Permanently delete an account. Disconnects any active session.
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        "404":
          $ref: "#/components/responses/NotFound"

  /api/accounts/{id}/connect:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: connectAccount
      tags: [Sessions]
      summary: Connect
      description: Explicitly connect to the MT5 broker. Not required — all endpoints auto-connect.
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/SessionConnect"
        "502":
          description: Connection failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/accounts/{id}/disconnect:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: disconnectAccount
      tags: [Sessions]
      summary: Disconnect
      description: Explicitly disconnect from the broker.
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      disconnected:
                        type: boolean
                        example: true

  /api/accounts/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: connectionStatus
      tags: [Sessions]
      summary: Connection status
      description: Check session state without triggering a connect.
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/SessionStatus"

  /api/accounts/{id}/orders:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      operationId: createOrder
      tags: [Trading]
      summary: Place order
      description: |
        Send a new order to the broker. Supports market, limit, stop, and stop-limit orders.

        **Side + Type mapping:**
        - `buy` + `market` = Buy
        - `sell` + `market` = Sell
        - `buy` + `limit` = BuyLimit
        - `sell` + `limit` = SellLimit
        - `buy` + `stop` = BuyStop
        - `sell` + `stop` = SellStop
        - `buy` + `stop_limit` = BuyStopLimit
        - `sell` + `stop_limit` = SellStopLimit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, side, type, volume]
              properties:
                symbol:
                  type: string
                  description: Trading instrument
                  example: "EURUSD"
                side:
                  type: string
                  enum: [buy, sell]
                  example: "buy"
                type:
                  type: string
                  enum: [market, limit, stop, stop_limit]
                  example: "market"
                volume:
                  type: number
                  description: Lot size
                  example: 0.01
                price:
                  type: number
                  description: Required for limit/stop orders
                sl:
                  type: number
                  description: Stop loss price
                tp:
                  type: number
                  description: Take profit price
                deviation:
                  type: integer
                  description: Max slippage in points
                comment:
                  type: string
                  description: Order comment visible in MT5
      responses:
        "200":
          description: Order result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"
        "422":
          description: Order rejected by broker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listOpenOrders
      tags: [Trading]
      summary: List open orders
      description: Returns all open positions and pending orders.
      responses:
        "200":
          description: Open orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  /api/accounts/{id}/orders/history:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: from
        in: query
        required: true
        schema:
          type: string
        description: "Start datetime (YYYY-MM-DDTHH:mm:ss)"
        example: "2026-01-01T00:00:00"
      - name: to
        in: query
        required: true
        schema:
          type: string
        description: "End datetime (YYYY-MM-DDTHH:mm:ss)"
        example: "2026-04-01T23:59:59"
    get:
      operationId: orderHistory
      tags: [Trading]
      summary: Order history
      description: Returns closed orders within a date range.
      responses:
        "200":
          description: Closed orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

  /api/accounts/{id}/orders/{ticket}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ticket
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Order ticket number

    put:
      operationId: modifyOrder
      tags: [Trading]
      summary: Modify order
      description: Modify an existing open or pending order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                  description: New price (pending orders)
                sl:
                  type: number
                  description: New stop loss
                tp:
                  type: number
                  description: New take profit
      responses:
        "200":
          description: Modification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"

    delete:
      operationId: closeOrder
      tags: [Trading]
      summary: Close order
      description: Close a position or cancel a pending order. Optionally close partial volume.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                volume:
                  type: number
                  description: Partial close volume. Omit to close entirely.
      responses:
        "200":
          description: Close result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Order"

  /api/accounts/{id}/summary:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: accountSummary
      tags: [Account Info]
      summary: Account summary
      description: Returns balance, equity, margin, profit, leverage, currency, credit, type, method, and investor flag.
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AccountSummary"

  /api/accounts/{id}/details:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: accountDetails
      tags: [Account Info]
      summary: Account details
      description: Returns full account information including name, company, server, and group.
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AccountDetails"

  /api/accounts/{id}/equity-history:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: from
        in: query
        required: true
        schema:
          type: string
        description: "Start datetime (YYYY-MM-DDTHH:mm:ss)"
      - name: timeframe
        in: query
        schema:
          type: string
          enum: [H1, H4, D1]
          default: H1
        description: Timeframe
    get:
      operationId: equityHistory
      tags: [Account Info]
      summary: Equity history
      description: Returns balance and equity over time.
      responses:
        "200":
          description: Equity data points
          content:
