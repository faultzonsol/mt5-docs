asyncapi: 3.0.0
info:
  title: Easier Prop WebSocket API
  version: 1.0.0
  description: |
    Real-time WebSocket API for MT5 trading data.
    Subscribe to channels to receive live quotes, order updates, profit/equity changes,
    heartbeats, new position events, price/spread/P&L alerts, and aggregate feeds.
    Supports multi-account streaming on a single connection.

servers:
  production:
    host: api.easierprop.com
    protocol: wss
    pathname: /ws
    description: "Production WebSocket server. Pass API key via query: wss://api.easierprop.com/ws?apiKey=sk_your_key"
    security:
      - $ref: "#/components/securitySchemes/ApiKeyAuth"

channels:
  quotes:
    address: /ws
    title: "Live Quotes"
    description: |
      Real-time bid/ask ticks for subscribed symbols. Updates at the configured interval.
      Quote data is wrapped in a `data` field containing the upstream quote object.

      **Channel name:** `quotes`
      **Required:** `symbols` array, `account_id`
      **Default interval:** 500ms
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/QuoteEvent"

  orders:
    address: /ws
    title: "Order Updates"
    description: |
      Real-time order events — new fills, modifications, and closures.
      Order data is wrapped in a `data` field containing the full order object.

      **Channel name:** `orders`
      **Required:** `account_id`
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/OrderUpdateEvent"

  profit:
    address: /ws
    title: "Profit & Equity"
    description: |
      Live equity, profit, margin, and balance updates.
      Profit data is wrapped in a `data` field.

      **Channel name:** `profit`
      **Required:** `account_id`
      **Default interval:** 1000ms
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/ProfitEvent"

  heartbeat:
    address: /ws
    title: "Heartbeat"
    description: |
      Periodic account health snapshot with balance, equity, margin, and position count.

      **Channel name:** `heartbeat`
      **Required:** `account_id`
      **Default interval:** 5000ms
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/HeartbeatEvent"

  new_position:
    address: /ws
    title: "New Position"
    description: |
      Fires when a new position is opened on the account. Delivers the full order object in a `data` wrapper.

      **Channel name:** `new_position`
      **Required:** `account_id`
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/NewPositionEvent"

  aggregate:
    address: /ws
    title: "Aggregate Feed"
    description: |
      Combined feed that delivers quotes, orders, and profit updates in a single subscription.
      Useful when you want all event types without multiple subscribe calls.

      **Channel name:** `aggregate`
      **Required:** `account_id`, `symbols` (for quote data)
    messages:
      subscribe:
        $ref: "#/components/messages/SubscribeMessage"
      event:
        $ref: "#/components/messages/QuoteEvent"

operations:
  subscribeQuotes:
    action: receive
    channel:
      $ref: "#/channels/quotes"
    summary: Subscribe to live quotes
    messages:
      - $ref: "#/channels/quotes/messages/subscribe"

  receiveQuotes:
    action: send
    channel:
      $ref: "#/channels/quotes"
    summary: Receive quote ticks
    messages:
      - $ref: "#/channels/quotes/messages/event"

  subscribeOrders:
    action: receive
    channel:
      $ref: "#/channels/orders"
    summary: Subscribe to order updates
    messages:
      - $ref: "#/channels/orders/messages/subscribe"

  receiveOrders:
    action: send
    channel:
      $ref: "#/channels/orders"
    summary: Receive order events
    messages:
      - $ref: "#/channels/orders/messages/event"

  subscribeProfit:
    action: receive
    channel:
      $ref: "#/channels/profit"
    summary: Subscribe to profit updates
    messages:
      - $ref: "#/channels/profit/messages/subscribe"

  receiveProfit:
    action: send
    channel:
      $ref: "#/channels/profit"
    summary: Receive profit events
    messages:
      - $ref: "#/channels/profit/messages/event"

  subscribeHeartbeat:
    action: receive
    channel:
      $ref: "#/channels/heartbeat"
    summary: Subscribe to heartbeat
    messages:
      - $ref: "#/channels/heartbeat/messages/subscribe"

  receiveHeartbeat:
    action: send
    channel:
      $ref: "#/channels/heartbeat"
    summary: Receive heartbeat events
    messages:
      - $ref: "#/channels/heartbeat/messages/event"

  subscribeNewPosition:
    action: receive
    channel:
      $ref: "#/channels/new_position"
    summary: Subscribe to new position events
    messages:
      - $ref: "#/channels/new_position/messages/subscribe"

  receiveNewPosition:
    action: send
    channel:
      $ref: "#/channels/new_position"
    summary: Receive new position events
    messages:
      - $ref: "#/channels/new_position/messages/event"

  subscribeAggregate:
    action: receive
    channel:
      $ref: "#/channels/aggregate"
    summary: Subscribe to aggregate feed
    messages:
      - $ref: "#/channels/aggregate/messages/subscribe"

  receiveAggregate:
    action: send
    channel:
      $ref: "#/channels/aggregate"
    summary: Receive aggregate events
    messages:
      - $ref: "#/channels/aggregate/messages/event"

components:
  securitySchemes:
    ApiKeyAuth:
      type: httpApiKey
      name: apiKey
      in: query
      description: "API key passed as query parameter: wss://api.easierprop.com/ws?apiKey=sk_your_key"

  messages:
    SubscribeMessage:
      name: subscribe
      title: Subscribe
      summary: Subscribe to a channel
      contentType: application/json
      payload:
        type: object
        required: [type, channel, account_id]
        properties:
          type:
            type: string
            const: subscribe
          channel:
            type: string
            enum: [quotes, orders, profit, heartbeat, new_position, aggregate]
            description: Channel to subscribe to
          account_id:
            type: string
            format: uuid
            description: MT5 account ID
          symbols:
            type: array
            items:
              type: string
            description: Required for quotes and aggregate channels
            examples:
              - ["EURUSD", "GBPUSD"]
          interval_ms:
            type: integer
            description: Minimum milliseconds between updates
            default: 500
        examples:
          - type: subscribe
            channel: quotes
            account_id: "70f60784-20f1-45ba-9a04-8e01c0b810c3"
            symbols: ["EURUSD", "GBPUSD"]
            interval_ms: 500

    QuoteEvent:
      name: quote
      title: Quote Tick
      summary: Real-time bid/ask update (data wrapper contains the upstream quote object)
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: quote
          account_id:
            type: string
            format: uuid
          data:
            type: object
            description: Upstream quote object
            properties:
              ask:
                type: number
                example: 1.08544
              bid:
                type: number
                example: 1.08542
              last:
                type: number
                example: 0.0
              symbol:
                type: string
                example: "EURUSD"
              time:
                type: string
                example: "2026-04-01T12:30:00"
              volume:
                type: number
                example: 0.0

    OrderUpdateEvent:
      name: order_update
      title: Order Update
      summary: Order opened, modified, or closed (data wrapper contains the full order object)
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: order_update
          account_id:
            type: string
            format: uuid
          data:
            type: object
            description: Full order object
            properties:
              ticket:
                type: integer
                example: 12345678
              symbol:
                type: string
                example: "EURUSD"
              orderType:
                type: string
                example: "Buy"
              lots:
                type: number
                example: 0.01
              openPrice:
                type: number
                example: 1.08542
              profit:
                type: number
                example: 3.20
              swap:
                type: number
                example: 0.0
              commission:
                type: number
                example: -0.07

    ProfitEvent:
      name: profit
      title: Profit Update
      summary: Live equity and P&L (data wrapper)
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: profit
          account_id:
            type: string
            format: uuid
          data:
            type: object
            description: Profit and equity data
            properties:
              balance:
                type: number
                example: 10000.00
              equity:
                type: number
                example: 10142.50
              profit:
                type: number
                example: 142.50
              margin:
                type: number
                example: 500.00
              freeMargin:
                type: number
                example: 9642.50

    HeartbeatEvent:
      name: heartbeat
      title: Heartbeat
      summary: Periodic account health snapshot
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: heartbeat
          account_id:
            type: string
            format: uuid
          balance:
            type: number
            example: 10000.00
          equity:
            type: number
            example: 10142.50
          free_margin:
            type: number
            example: 9642.50
          margin:
            type: number
            example: 500.00
          position_count:
            type: integer
            example: 3
          profit:
            type: number
            example: 142.50

    NewPositionEvent:
      name: new_position
      title: New Position
      summary: Fired when a new position is opened
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: new_position
          account_id:
            type: string
            format: uuid
          data:
            type: object
            description: Full order object for the new position

    PriceAlertMessage:
      name: price_alert
      title: Register Price Alert
      summary: Register a price alert for a symbol
      contentType: application/json
      payload:
        type: object
        required: [type, account_id, symbol, direction, target_price]
        properties:
          type:
            type: string
            const: price_alert
          account_id:
            type: string
            format: uuid
          symbol:
            type: string
            example: "EURUSD"
          direction:
            type: string
            enum: [above, below]
            example: "above"
          target_price:
            type: number
            example: 1.09000

    SpreadAlertMessage:
      name: spread_alert
      title: Register Spread Alert
      summary: Register a spread alert for a symbol
      contentType: application/json
      payload:
        type: object
        required: [type, account_id, symbol, max_pips]
        properties:
          type:
            type: string
            const: spread_alert
          account_id:
            type: string
            format: uuid
          symbol:
            type: string
            example: "EURUSD"
          max_pips:
            type: number
            example: 2.0

    PlAlertMessage:
      name: pl_alert
      title: Register P&L Alert
      summary: Register a profit/loss threshold alert
      contentType: application/json
      payload:
        type: object
        required: [type, account_id, condition, threshold]
        properties:
          type:
            type: string
            const: pl_alert
          account_id:
            type: string
            format: uuid
          condition:
            type: string
            enum: [above, below]
            example: "below"
          threshold:
            type: number
            example: -500.00

    CancelAlertMessage:
      name: cancel_alert
      title: Cancel Alert
      summary: Cancel a previously registered alert
      contentType: application/json
      payload:
        type: object
        required: [type, alert_id]
        properties:
          type:
            type: string
            const: cancel_alert
          alert_id:
            type: string
            format: uuid

    AlertRegisteredEvent:
      name: alert_registered
      title: Alert Registered
      summary: Confirmation that an alert was registered
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: alert_registered
          alert_id:
            type: string
            format: uuid
          alert_type:
            type: string
            enum: [price_alert, spread_alert, pl_alert]

    PriceAlertTriggeredEvent:
      name: price_alert_triggered
      title: Price Alert Triggered
      summary: Fired when a price alert condition is met
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: price_alert_triggered
          account_id:
            type: string
            format: uuid
          alert_id:
            type: string
            format: uuid
          current_ask:
            type: number
            example: 1.09010
          current_bid:
            type: number
            example: 1.09008
          direction:
            type: string
            example: "above"
          symbol:
            type: string
            example: "EURUSD"
          target_price:
            type: number
            example: 1.09000

    SpreadAlertTriggeredEvent:
      name: spread_alert_triggered
      title: Spread Alert Triggered
      summary: Fired when spread exceeds the configured threshold
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: spread_alert_triggered
          account_id:
            type: string
            format: uuid
          alert_id:
            type: string
            format: uuid
          ask:
            type: number
            example: 1.08560
          bid:
            type: number
            example: 1.08530
          max_pips:
            type: number
            example: 2.0
          spread_pips:
            type: number
            example: 3.0
          symbol:
            type: string
            example: "EURUSD"

    PlAlertTriggeredEvent:
      name: pl_alert_triggered
      title: P&L Alert Triggered
      summary: Fired when account P&L crosses the threshold
      contentType: application/json
      payload:
        type: object
        properties:
          type:
            type: string
            const: pl_alert_triggered
          account_id:
            type: string
            format: uuid
          alert_id:
            type: string
            format: uuid
          condition:
            type: string
            example: "below"
          current_value:
            type: number
            example: -520.00
          threshold:
            type: number
            example: -500.00
